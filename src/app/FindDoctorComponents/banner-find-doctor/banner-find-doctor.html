<section>
  <div
    class="min-h-[500px] md:h-[625px] relative pt-[80px] md:pt-[100px]"
    [ngStyle]="{ 'background-image': 'url(' + background + ')' }"
    style="background-size: cover; background-position: center"
  >
    <div class="container mx-auto px-6 md:px-12 lg:px-20 flex flex-col lg:flex-row items-center justify-between py-10 lg:py-0 min-h-full">
      <!-- left side -->
      <div class="flex flex-col gap-4 w-full lg:w-1/2 text-center lg:text-left">
        <h1 class="text-[#274760] text-3xl md:text-5xl lg:text-[56px] font-semibold lg:leading-[70px]">
          Introduce You to Our Experts
        </h1>
        <p class="text-[#274760] text-lg md:text-[20px] font-normal pt-2">
          The list of certified doctors with years of professional experiences
        </p>
      </div>

      <!-- right side -->
      <div class="w-full lg:w-1/2 mt-10 lg:mt-0 flex justify-center lg:justify-end">
        <img [src]="findDoctor" alt="doctor" class="w-full max-w-[736px] h-auto object-contain">
      </div>
    </div>
  </div>
</section>
