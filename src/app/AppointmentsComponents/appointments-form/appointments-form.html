<section class="px-6 md:px-12 lg:px-28 mt-16 md:mt-32">
  <div class="max-w-7xl mx-auto">
    <form class="w-full flex flex-col lg:flex-row gap-12 lg:gap-20 justify-between">
      <div class="w-full lg:flex-1">
        <h1 class="text-[#274760] text-2xl md:text-[32px] font-semibold mb-8">Appointment</h1>

        <div class="flex flex-col sm:flex-row items-center gap-6 w-full">
          <div class="w-full">
            <label class="block text-[#274760] text-sm md:text-[16px] font-normal mb-2" for="fullName">Name</label>
            <input
              class="w-full border border-[#307bc3] rounded-lg px-4 py-3 md:py-5 outline-none focus:ring-2 focus:ring-[#307bc333] transition-all"
              type="text"
              id="fullName"
              name="fullName"
              placeholder="Chen Reatrey"
            />
          </div>

          <div class="w-full">
            <label class="block text-[#274760] text-sm md:text-[16px] font-normal mb-2" for="phoneNumber">Phone Number</label>
            <input
              class="w-full border border-[#307bc3] rounded-lg px-4 py-3 md:py-5 outline-none focus:ring-2 focus:ring-[#307bc333] transition-all"
              type="text"
              id="phoneNumber"
              name="phoneNumber"
              placeholder="+855 1234 5678"
            />
          </div>
        </div>

        <div class="mt-6">
          <label class="block text-[#274760] text-sm md:text-[16px] font-normal mb-2" for="medicalRecordNumber">Medical Record Number</label>
          <input
            class="w-full border border-[#307bc3] rounded-lg px-4 py-3 md:py-5 outline-none focus:ring-2 focus:ring-[#307bc333] transition-all"
            type="text"
            id="medicalRecordNumber"
            name="medicalRecordNumber"
            placeholder="232134-234-4325-3532"
          />
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-6 mt-6">
          <div class="w-full">
            <label class="block text-[#274760] text-sm md:text-[16px] font-normal mb-2" for="reasonForVisit">Reason for visit</label>
            <select
              class="w-full border border-[#307bc3] rounded-lg px-4 py-3 md:py-5 outline-none focus:ring-2 focus:ring-[#307bc333] transition-all bg-white"
              id="reasonForVisit"
              name="reasonForVisit"
            >
              <option value="" disabled selected>Select an option</option>
              <option value="generalConsultation">Operation</option>
              <option value="followUpVisit">Pathology Test</option>
              <option value="specialistReferral">Report Checkup</option>
              <option value="routineCheckup">Other Checkup</option>
            </select>
          </div>

          <div class="w-full">
            <label class="block text-[#274760] text-sm md:text-[16px] font-normal mb-2" for="department">Department</label>
            <select
              class="w-full border border-[#307bc3] rounded-lg px-4 py-3 md:py-5 outline-none focus:ring-2 focus:ring-[#307bc333] transition-all bg-white"
              id="department"
              name="department"
            >
              <option value="" disabled selected>Select an option</option>
              <option value="cardiology">Cardiology</option>
              <option value="neurology">Neurology</option>
              <option value="orthopedics">Orthopedics</option>
              <option value="pediatrics">Pediatrics</option>
              <option value="dermatology">Dermatology</option>
            </select>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-6 mt-6">
          <div class="w-full">
            <label class="block text-[#274760] text-sm md:text-[16px] font-normal mb-2" for="preferredDate">Preferred Date</label>
            <input
              class="w-full border border-[#307bc3] rounded-lg px-4 py-3 md:py-5 outline-none focus:ring-2 focus:ring-[#307bc333] transition-all"
              type="date"
              id="preferredDate"
              name="preferredDate"
            />
          </div>

          <div class="w-full">
            <label class="block text-[#274760] text-sm md:text-[16px] font-normal mb-2" for="preferredTime">Preferred Time</label>
            <select
              class="w-full border border-[#307bc3] rounded-lg px-4 py-3 md:py-5 outline-none focus:ring-2 focus:ring-[#307bc333] transition-all bg-white"
              id="preferredTime"
              name="preferredTime"
            >
              <option value="" disabled selected>Select an option</option>
              <option value="9am-10am">9AM-10AM</option>
              <option value="10am-11am">10AM-11AM</option>
              <option value="11am-12pm">11AM-12PM</option>
              <option value="1pm-2pm">1PM-2PM</option>
            </select>
          </div>
        </div>

        <button
          class="book-now-btn mt-10 w-full sm:w-[178px] h-[50px] flex items-center justify-center text-white py-3 px-4 gap-2 rounded-full shadow-md hover:shadow-lg transition-all text-[16px] duration-300"
        >
          <span>Submit</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>

      <!-- right side -->
      <div class="w-full lg:w-[416px] flex flex-col">
        <h1 class="text-[#274760] text-2xl md:text-[32px] font-semibold mb-8">Contact Info</h1>
        <div class="w-full aspect-[416/248] mb-10">
          <img [src]='contact' alt="contact" class="w-full h-full object-cover rounded-2xl shadow-sm">
        </div>

        <article class="flex flex-col gap-8 md:gap-10">
          <div class="flex flex-col gap-2">
            <h1 class="text-xl md:text-[22px] text-[#274760] font-semibold">Phone</h1>
            <p class="text-base md:text-[16px] text-[#7d91a0] font-medium">123-456-7890</p>
          </div>
          <div class="flex flex-col gap-2">
            <h1 class="text-xl md:text-[22px] text-[#274760] font-semibold">Email Us</h1>
            <p class="text-base md:text-[16px] text-[#7d91a0] font-medium">hellocallcenter@gmail.com</p>
          </div>
          <div class="flex flex-col gap-2">
            <h1 class="text-xl md:text-[22px] text-[#274760] font-semibold">Our Location</h1>
            <p class="text-base md:text-[16px] text-[#7d91a0] font-medium">123 Anywhere St., Any City, 12345</p>
          </div>
        </article>
      </div>
    </form>
  </div>
</section>
