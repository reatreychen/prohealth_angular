<section class="mt-16 md:mt-32 px-6 md:px-12 lg:px-28 flex items-center justify-center">
  <div class="min-h-[250px] md:h-[334px] relative w-full max-w-[1296px] rounded-[28px] flex items-center justify-center overflow-hidden"
       [ngStyle]="{ 'background-image': 'url(' + background_about + ')' }"
       style="background-size: cover; background-position: center"
  >
    <!-- Overlay for better readability if needed -->
    <div class="absolute inset-0 bg-white/10"></div>

    <div class="relative z-10 grid grid-cols-2 lg:grid-cols-4 gap-6 md:gap-10 p-8 w-full">
      <div *ngFor="let stat of statistics" class="flex flex-col items-center justify-center text-center">
        <h1 class="text-3xl md:text-5xl lg:text-[56px] text-[#274760] font-semibold leading-tight">{{ stat.value }}</h1>
        <p class="text-sm md:text-base text-[#274760] font-medium mt-2">{{ stat.description }}</p>
      </div>
    </div>
  </div>
</section>
