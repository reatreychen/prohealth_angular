<section class="mt-16 md:mt-32 mb-16 md:mb-24 px-6 md:px-12 lg:px-28">
  <div class="flex items-center flex-col justify-center text-center">
    <p class="text-xl md:text-[26px] font-semibold text-[#307bc4]">AWARDS</p>
    <h2 class="text-3xl md:text-5xl lg:text-[56px] text-center font-semibold text-[#274760] lg:leading-[70px] pt-3 w-full">
      Winning Awards and Recognition
    </h2>
    <p class="text-base md:text-[16px] text-[#7d91a0] text-center pt-4 md:pt-[25px] max-w-2xl">
      We have been recognized for our commitment to excellence in healthcare.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 pt-10 md:pt-16">
    <div *ngFor="let awardItem of awards" class="w-full h-auto p-5 bg-white rounded-2xl shadow-lg flex items-center gap-4 transition-transform hover:-translate-y-1 duration-300">
      <div class="w-20 h-20 bg-[#307bc4] rounded-lg flex-shrink-0 flex items-center justify-center">
        <img [src]="awardItem.image" [alt]="awardItem.name" class="w-10 h-12 object-contain"/>
      </div>
      <p class="text-[#274760] text-lg font-medium leading-snug">{{ awardItem.name }}</p>
    </div>
  </div>
</section>
