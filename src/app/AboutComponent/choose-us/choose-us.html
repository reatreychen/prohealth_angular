<section class="px-6 md:px-12 lg:px-28 mt-16 md:mt-32">
  <div class="flex flex-col lg:flex-row gap-12 lg:gap-20 items-center">
    <!-- left side -->
    <div class="w-full lg:w-1/2 max-w-[481px]">
      <img [src]="choose" alt="choose us" class="w-full h-auto object-cover rounded-3xl shadow-sm">
    </div>

    <!-- right side -->
    <div class="w-full lg:w-1/2">
      <h1 class="text-3xl md:text-5xl lg:text-[56px] text-[#274760] font-semibold text-center lg:text-left">Why Choose Us</h1>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 pt-10 md:pt-16 gap-8 lg:gap-10">
        <div *ngFor="let feature of features" class="relative w-full max-w-[361px] flex flex-col mx-auto lg:mx-0">
          <div>
            <div class="w-10 h-10 bg-[#307bc3] rounded-full flex items-center justify-center text-white flex-shrink-0">
              <img [src]="feature.icon" [alt]="feature.iconAlt" class="object-contain" [style.width]="feature.iconWidth" [style.height]="feature.iconHeight">
            </div>
            <article class="pt-4">
              <h1 class="text-[#274760] text-xl md:text-[25px] pb-2 md:pb-[12px] font-semibold leading-tight">{{ feature.title }}</h1>
              <p class="text-[#7d91a9] text-sm md:text-[16px] leading-relaxed">{{ feature.description }}</p>
            </article>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
