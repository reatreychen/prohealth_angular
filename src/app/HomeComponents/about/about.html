<section class="px-6 md:px-12 lg:px-20 mt-20 md:mt-32 lg:mt-[200px]">
  <div class="flex flex-col lg:flex-row items-center justify-center gap-10 lg:gap-20">
    <!-- left side -->
    <div class="w-full max-w-[566px] relative">
      <img [src]="consultant" alt="consultant" class="w-full h-auto">
      <div class="hidden md:block">
        <img [src]="professionalLogo" alt="professionalLogo"
          class="absolute top-[40%] right-[10%] lg:top-[300px] lg:right-32 professionals-animation w-32 md:w-40 lg:w-auto" 
          data-aos="zoom-in" data-aos-delay="200">
        <!-- icons verify -->
        <span class="absolute top-[50%] right-[25%] lg:top-[370px] lg:right-[200px]">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="w-10 h-10 md:w-12 md:h-12 text-[#307bc4]">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z" />
          </svg>
        </span>
      </div>
    </div>

    <!-- right side -->
    <div class="w-full max-w-[640px] text-center lg:text-left">
      <h1 class="text-[#307bc4] text-xl md:text-[26px] font-semibold mb-4 lg:mb-0">ABOUT US</h1>
      <div class="flex flex-col pb-6 md:pb-12 lg:pb-[85px]">
        <h2 class="text-[#274760] text-3xl md:text-5xl lg:text-[56px] font-semibold leading-tight">
          ProHealth is a team of experienced medical professionals
        </h2>
      </div>
      <p class="text-[#7D91A0] text-base md:text-[16px] leading-relaxed">
        Dedicated to providing top-quality healthcare services. We believe in a
        holistic approach to healthcare that focuses on treating the whole
        person, not just the illness or symptoms.
      </p>
    </div>
  </div>
</section>
